# =========================================================================
# eWAF Custom ModSecurity Rules & Overrides
# =========================================================================

# 1. ENCENDIDO FORZADO (EL TRUCO MAESTRO)
# En el archivo docker-compose pusimos el motor global en "DetectionOnly" (Modo pasivo).
# Como este archivo SOLO se carga en el pasillo "/internal-nginx-proxy-modsec",
# forzamos el encendido activo aquí. ¡El tráfico que pase por aquí bloqueará los ataques!
SecRuleEngine On

# 2. LÍMITES DE MEMORIA Y UPLOADS
# Por defecto ModSecurity bloquea peticiones mayores a 1MB (Rompiendo cargas de fotos/archivos).
# Aumentamos el límite a 15 MB para soportar aplicaciones modernas sin falsos positivos.
SecRequestBodyLimit 15728640
SecRequestBodyNoFilesLimit 131072

# 3. MOTOR DE INSPECCIÓN JSON
# Las SPAs (como GitHub o React) hablan en JSON. Le decimos a ModSecurity 
# que parsee y analice el cuerpo de los JSON en busca de Inyecciones SQL o XSS.
SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.max_num_args=255"

# 4. EXCEPCIONES ESPECÍFICAS (Falsos Positivos)
# Si en el futuro notas que ModSecurity bloquea una acción legítima de tu aplicación, 
# verás el ID de la regla en los logs y puedes apagarla específicamente aquí.
# Ejemplo (Descomentar para usar): 
# SecRuleRemoveById 941100
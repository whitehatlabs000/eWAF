# =========================================================================
# ZONA DE MEMORIA CACHÉ (CONTROL PLANE)
# =========================================================================
# Creamos el espacio en disco (máximo 1GB) para guardar archivos temporales.
# NGINX respetará la orden que eWAF le envíe mediante la cabecera X-Accel-Expires.
proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=ewaf_cache:10m max_size=1g inactive=60m use_temp_path=off;

server {
    # NGINX ahora corre sin privilegios root, debe escuchar en un puerto alto (>1024)
    listen       8080;
    server_name  localhost;

    # =========================================================================
    # CONFIGURACIÓN GLOBAL
    # =========================================================================

    # EL DIRECTORIO TELEFÓNICO (DNS)
    # Como eWAF nos envía URLs dinámicas que cambian en tiempo real ($target_url),
    # NGINX necesita saber a qué servidor DNS preguntarle para traducir dominios (ej. "github.com") a IPs.
    # El DNS de Docker (127.0.0.11) va primero para resolver nombres de contenedores.
    # Luego Usamos los DNS públicos de Google (8.8.8.8) y Cloudflare (1.1.1.1) para salidas a Internet.
    resolver 127.0.0.11 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # =========================================================================
    # 1. RUTA PRINCIPAL (La puerta de entrada a eWAF)
    # =========================================================================
    # Todo lo que entra a NGINX por el puerto 80, se lo manda a tu Tomcat.
    location / {
        # TRUCO DE RED (VERSATILIDAD DEV/PROD):
        # En Desarrollo (Windows), host.docker.internal apunta al Tomcat de IntelliJ.
        # En Producción (Linux), le daremos este mismo alias de red al contenedor de Tomcat
        # en el docker-compose.yml. ¡Así este archivo nunca cambia!
        proxy_pass http://host.docker.internal:8080;
        
        # Ampliamos los buffers de la puerta principal para soportar 
        # las respuestas gigantes que Tomcat nos traiga (ej: Google).
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Pasamos los datos reales del cliente para que tu Rate Limiting y bloqueos de IP funcionen en Java
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Le avisa a Tomcat si el cliente original usó HTTP o HTTPS
        proxy_set_header X-Forwarded-Proto $scheme; 
    }

    # =========================================================================
    # 2.A. RUTA SECRETA DE DELEGACIÓN BLINDADA (CON ModSecurity)
    # =========================================================================
    # IMPORTANTE: Esta regla debe ir PRIMERO para que el regex no colisione con el otro.
    # NGINX usará este pasillo si Java manda X-Accel-Redirect a /internal-nginx-proxy-modsec
    location ~ ^/internal-nginx-proxy-modsec(.*)$ {
        internal;
        
        # ENCENDEMOS EL MOTOR ANTI-HACKERS C++ AL 100% PARA ESTA RUTA
        modsecurity on;
        # Cargamos únicamente nuestras reglas y excepciones (las base ya están cargadas por OWASP)
        modsecurity_rules_file /etc/modsecurity.d/modsecurity-custom.conf;
        
        proxy_cache ewaf_cache;
        
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Extraemos la URL de destino final que tu Java nos mandó oculta en X-Target-Url
        set $target_url $upstream_http_x_target_url;
        # Evitamos que la cabecera interna de eWAF viaje hacia el servidor de destino
        proxy_hide_header X-Target-Url;
        # debe decirle explícitamente el nombre del servidor (SNI), de lo contrario es bloqueado.
        proxy_ssl_server_name on;
        
        # Ahora $1 ya trae su propia barra inicial.
        # $1 es la ruta restante que viene después de /internal-nginx-proxy/
        proxy_pass $target_url$1$is_args$args;
    }

    # =========================================================================
    # 2.B. RUTA SECRETA DE DELEGACIÓN RÁPIDA (SIN ModSecurity)
    # =========================================================================
    location ~ ^/internal-nginx-proxy(.*)$ {
        internal;
        
        # APAGAMOS ModSecurity explícitamente para máxima velocidad
        modsecurity off;
        
        proxy_cache ewaf_cache;
        
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # Extraemos la URL de destino final que tu Java nos mandó oculta en X-Target-Url
        set $target_url $upstream_http_x_target_url;
        # Evitamos que la cabecera interna de eWAF viaje hacia el servidor de destino
        proxy_hide_header X-Target-Url;
        # debe decirle explícitamente el nombre del servidor (SNI), de lo contrario es bloqueado.
        proxy_ssl_server_name on;
        
        # Ahora $1 ya trae su propia barra inicial.
        # $1 es la ruta restante que viene después de /internal-nginx-proxy/
        proxy_pass $target_url$1$is_args$args;
    }
    
    # =========================================================================
    # 3. RUTA SECRETA PARA SPRING CLOUD GATEWAY
    # =========================================================================
    location ~ ^/internal-spring-proxy(.*)$ {
        internal;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
        
        # A diferencia del bloque anterior, AQUÍ SÍ LE PASAMOS LA CABECERA A SPRING
        # Spring Cloud Gateway necesita leer X-Target-Url para saber a dónde rutear
        set $target_url $upstream_http_x_target_url;
        proxy_set_header X-Target-Url $target_url;
        
        # NGINX le pasa el paquete de datos al microservicio Java de Spring (Puerto 8082)
        # NGINX habla directamente con el contenedor "spring-gateway" en la red de Docker.
        proxy_pass http://spring-gateway:8082$1$is_args$args;
    }
}